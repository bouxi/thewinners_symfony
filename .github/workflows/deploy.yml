name: Deploy to VPS

on:
  push:
    branches: ["main"]

# Empêche 2 déploiements en même temps (push rapprochés)
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Si tu crées un Environment "production", décommente la ligne suivante :
    # environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.VPS_PATH }}"
            chmod +x deploy.sh
            ./deploy.sh main